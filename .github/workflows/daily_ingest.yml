name: Daily Ingest

# Runs the incremental load daily and on demand, then commits the refreshed
# SQLite database. The job FAILS (non-zero) if integrity checks fail, so bad
# data is never committed (spec §8 failure handling).

on:
  schedule:
    # 06:00 UTC = 23:00 PT (11pm PDT, summer). The last game of the day finishes
    # by ~10pm PT, so this gives the API ~1h to settle and still runs on the same
    # PT day — the finished rule (kickoff date <= today PT) then captures that
    # day's matches. (GitHub may delay scheduled runs by a few minutes.)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Ingest mode"
        type: choice
        options:
          - incremental
          - backfill
        default: incremental

# Allow the job to push the refreshed database back to the repo.
permissions:
  contents: write

concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingest (${{ github.event.inputs.mode || 'incremental' }})
        env:
          # Resolved from os.environ first (config.py step 1); the central .env
          # is absent on the runner, which is fine.
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
        run: python src/ingest.py --mode "${{ github.event.inputs.mode || 'incremental' }}"

      # ER-6 (GNews) retired 2026-06-20 — superseded by ER-8 ESPN/FIFA deep links.
      # news_ingest.py / gnews.py and the existing `news` table remain (dormant) for
      # history; no daily GNews calls are made. Revive by re-adding a news step.

      - name: Refresh Excel export
        run: python src/export_excel.py

      - name: Refresh HTML report pages
        # Pure DB read (no extra deps); non-fatal so a render hiccup never blocks
        # the data commit below. These power the local dashboards / infographics.
        continue-on-error: true
        run: python src/report_html.py

      - name: Refresh report notebooks + figures
        # Non-fatal: a notebook hiccup must never block the data commit below.
        continue-on-error: true
        run: |
          pip install -r requirements-reports.txt
          jupyter nbconvert --to notebook --execute --inplace \
            --ExecutePreprocessor.timeout=300 \
            reports/01_group_breakdown.ipynb reports/02_top_scorers.ipynb
          python scripts/render_report_pngs.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/worldcup.db reports/worldcup_tables.xlsx \
                  reports/01_group_breakdown.ipynb reports/02_top_scorers.ipynb \
                  reports/01_group_breakdown.png \
                  reports/page3_matches.html reports/page_groups.html \
                  reports/page_knockout.html reports/page_bracket.html \
                  reports/page_storylines.html
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            mode="${{ github.event.inputs.mode || 'incremental' }}"
            git commit -m "data: refresh worldcup.db + reports ($mode, $(date -u +%Y-%m-%dT%H:%MZ)) [skip ci]"
            git push
          fi
