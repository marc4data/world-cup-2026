name: Daily Ingest

# Runs the incremental load daily and on demand, then commits the refreshed
# SQLite database. The job FAILS (non-zero) if integrity checks fail, so bad
# data is never committed (spec §8 failure handling).

on:
  schedule:
    # 08:00 UTC = 01:00 PT (PDT) — just after the PT cutoff day has rolled over,
    # so "finished as of the previous day" is stable.
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Ingest mode"
        type: choice
        options:
          - incremental
          - backfill
        default: incremental

# Allow the job to push the refreshed database back to the repo.
permissions:
  contents: write

concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingest (${{ github.event.inputs.mode || 'incremental' }})
        env:
          # Resolved from os.environ first (config.py step 1); the central .env
          # is absent on the runner, which is fine.
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
        run: python src/ingest.py --mode "${{ github.event.inputs.mode || 'incremental' }}"

      - name: Refresh Excel export
        run: python src/export_excel.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/worldcup.db reports/worldcup_tables.xlsx
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            mode="${{ github.event.inputs.mode || 'incremental' }}"
            git commit -m "data: refresh worldcup.db ($mode, $(date -u +%Y-%m-%dT%H:%MZ)) [skip ci]"
            git push
          fi
