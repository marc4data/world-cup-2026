name: Player Stats (manual / fallback)

# Player pulls (player / player_season_stat / fixture_player_stat) now run DAILY
# as part of the local pipeline (scripts/local_etl.sh) — that's the reliable path
# and it keeps a single source of truth (a separate cloud pusher would be clobbered
# by the local `git pull -X ours`, losing the player data). The scheduled trigger
# here is therefore DISABLED; kept for on-demand cloud runs only.
#   schedule:
#     - cron: "0 6 * * 1"   # was: Mondays 06:00 UTC (weekly)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Player ingest mode"
        type: choice
        options:
          - both
          - season
          - fixtures
        default: both
      max_fixtures:
        description: "Max /fixtures/players pulls this run"
        type: string
        default: "20"

permissions:
  contents: write

concurrency:
  group: weekly-players
  cancel-in-progress: false

jobs:
  players:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run player ingest (${{ github.event.inputs.mode || 'both' }})
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
        run: |
          python src/players_ingest.py \
            --mode "${{ github.event.inputs.mode || 'both' }}" \
            --max-fixtures "${{ github.event.inputs.max_fixtures || '20' }}"

      - name: Refresh Excel export
        run: python src/export_excel.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/worldcup.db reports/worldcup_tables.xlsx
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: refresh player stats ($(date -u +%Y-%m-%dT%H:%MZ)) [skip ci]"
            git push
          fi
